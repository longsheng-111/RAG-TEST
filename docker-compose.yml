version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dx-rag-backend
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
      - model_cache:/app/models
      - uploads_data:/app/uploads
      - ./.env:/app/.env:ro
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - UPLOAD_DIR=/app/uploads
      - EMBED_MODEL=BAAI/bge-small-zh-v1.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dx-rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  model_cache:
    driver: local
  uploads_data:
    driver: local
