services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dx-rag-backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - vector_data:/app/vector_db
      - model_cache:/app/models
      - uploads_data:/app/uploads
      - session_data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - VECTOR_PERSIST_DIR=/app/vector_db
      - SESSION_DIR=/app/data/sessions
      - UPLOAD_DIR=/app/uploads
      - EMBED_MODEL=BAAI/bge-small-zh-v1.5
      # 模型缓存持久化：容器内下载走 HF 镜像端点（vector_store.py:14-15），HF_HOME 为关键项
      - MODELSCOPE_CACHE=/app/models
      - HF_HOME=/app/models/hf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dx-rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vector_data:
    driver: local
  model_cache:
    driver: local
  uploads_data:
    driver: local
  session_data:
    driver: local
